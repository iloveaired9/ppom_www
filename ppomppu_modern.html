<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="뽐뿌 - 대한민국 최대 거래/쿠폰 커뮤니티">
    <meta name="keywords" content="거래, 쿠폰, 할인, 추천">
    <meta name="theme-color" content="#FF6B35">

    <title>뽐뿌 - 거래/쿠폰 커뮤니티</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>뽐</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header__container">
            <div class="header__logo">
                <h1><a href="/">뽐뿌</a></h1>
            </div>

            <nav class="header__nav">
                <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기/닫기">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-list">
                    <li><a href="#" class="nav-link">HOT</a></li>
                    <li><a href="#" class="nav-link">최신</a></li>
                    <li><a href="#" class="nav-link">이슈</a></li>
                    <li><a href="#" class="nav-link">커뮤니티</a></li>
                </ul>
            </nav>

            <div class="header__search">
                <form class="search-form" id="searchForm">
                    <input
                        type="search"
                        class="search-input"
                        id="searchInput"
                        placeholder="검색어를 입력하세요"
                        aria-label="검색">
                    <button type="submit" class="search-btn" aria-label="검색 버튼">
                        🔍
                    </button>
                </form>
            </div>

            <div class="header__user">
                <button class="btn btn--text">로그인</button>
                <button class="btn btn--primary">회원가입</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <section class="sidebar__section">
                <h2 class="sidebar__title">카테고리</h2>
                <ul class="category-list">
                    <li>
                        <label class="checkbox-label">
                            <input type="checkbox" class="category-filter" value="all" checked>
                            <span>전체</span>
                        </label>
                    </li>
                    <li>
                        <label class="checkbox-label">
                            <input type="checkbox" class="category-filter" value="grocery">
                            <span>🛒 마켓/식품</span>
                        </label>
                    </li>
                    <li>
                        <label class="checkbox-label">
                            <input type="checkbox" class="category-filter" value="fashion">
                            <span>👕 패션/뷰티</span>
                        </label>
                    </li>
                    <li>
                        <label class="checkbox-label">
                            <input type="checkbox" class="category-filter" value="electronics">
                            <span>📱 전자제품</span>
                        </label>
                    </li>
                    <li>
                        <label class="checkbox-label">
                            <input type="checkbox" class="category-filter" value="travel">
                            <span>✈️ 여행/숙박</span>
                        </label>
                    </li>
                </ul>
            </section>

            <section class="sidebar__section">
                <h2 class="sidebar__title">정렬</h2>
                <ul class="sort-list">
                    <li>
                        <button class="sort-btn" data-sort="latest" aria-pressed="true">최신순</button>
                    </li>
                    <li>
                        <button class="sort-btn" data-sort="popular">인기순</button>
                    </li>
                    <li>
                        <button class="sort-btn" data-sort="recommended">추천순</button>
                    </li>
                    <li>
                        <button class="sort-btn" data-sort="comments">댓글순</button>
                    </li>
                </ul>
            </section>

            <section class="sidebar__section">
                <h2 class="sidebar__title">필터</h2>
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" class="filter-checkbox" data-filter="hot">
                        <span>🔥 HOT (추천 100+)</span>
                    </label>
                </div>
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" class="filter-checkbox" data-filter="new">
                        <span>🆕 신상품만</span>
                    </label>
                </div>
                <button class="btn btn--secondary btn--block" id="resetFilters">필터 초기화</button>
            </section>
        </aside>

        <!-- Content Area -->
        <section class="content">
            <div class="content__header">
                <h1 class="content__title">거래 목록</h1>
                <div class="content__controls">
                    <select class="sort-select" id="sortSelect" aria-label="정렬 방식 선택">
                        <option value="latest">최신순</option>
                        <option value="popular">인기순</option>
                        <option value="recommended">추천순</option>
                        <option value="comments">댓글순</option>
                    </select>
                    <span class="content__count" id="itemCount">로딩 중...</span>
                </div>
            </div>

            <!-- Deal List -->
            <div class="deal-list" id="dealList">
                <!-- 아이템이 JavaScript로 동적으로 추가됨 -->
            </div>

            <!-- Pagination -->
            <nav class="pagination" id="pagination" aria-label="페이지 네비게이션">
                <!-- 페이지 버튼이 JavaScript로 동적으로 추가됨 -->
            </nav>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer__content">
            <div class="footer__section">
                <h3>뽐뿌</h3>
                <ul>
                    <li><a href="#">소개</a></li>
                    <li><a href="#">이용약관</a></li>
                    <li><a href="#">개인정보처리방침</a></li>
                    <li><a href="#">문의</a></li>
                </ul>
            </div>
            <div class="footer__section">
                <h3>고객지원</h3>
                <ul>
                    <li><a href="#">FAQ</a></li>
                    <li><a href="#">공지사항</a></li>
                    <li><a href="#">신고</a></li>
                    <li><a href="#">건의사항</a></li>
                </ul>
            </div>
            <div class="footer__section">
                <h3>팔로우</h3>
                <ul class="social-links">
                    <li><a href="#" aria-label="Facebook">f</a></li>
                    <li><a href="#" aria-label="Twitter">𝕏</a></li>
                    <li><a href="#" aria-label="YouTube">▶</a></li>
                </ul>
            </div>
        </div>
        <div class="footer__bottom">
            <p>&copy; 2024 Ppomppu. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modal: Deal Details -->
    <div class="modal" id="dealModal">
        <div class="modal__content">
            <button class="modal__close" id="closeModal" aria-label="닫기">&times;</button>
            <article class="deal-detail" id="dealDetail">
                <!-- 상세정보가 JavaScript로 동적으로 추가됨 -->
            </article>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js" defer></script>
</body>
</html>
